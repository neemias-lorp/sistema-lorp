services:
  - type: web
    name: sistema-lorp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: lorp-uploads
      mountPath: /app/static/uploads
      sizeGB: 1
    healthCheckPath: /
    autoDeploy: true
