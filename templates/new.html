{% extends "base.html" %}

{% block title %}Nova Pergunta{% endblock %}

{% block content %}
<h1>➕ Criar Nova Pergunta</h1>

<form method="POST" class="form">
    <label>Título:</label>
    <input type="text" name="titulo" required>
    
    <label>Pergunta:</label>
    <textarea name="pergunta" rows="3" required></textarea>
    
    <label>Resposta:</label>
    <textarea name="resposta" rows="8" required></textarea>
    
    <label>Categoria:</label>
    <select name="categoria">
        <option>Teoria</option>
        <option>Descobertas</option>
        <option>Validação</option>
        <option>Engenharia</option>
        <option>Paleografia</option>
    </select>
    
    <label>Ordem de exibição:</label>
    <input type="number" name="ordem" value="0">
    
    <label>
        <input type="checkbox" name="destaque"> Destacar esta pergunta
    </label>
    
    <button type="submit" class="btn-primary">Salvar Pergunta</button>
    <a href="/admin" class="btn-secondary">Cancelar</a>
</form>

<style>
.form label {
    display: block;
    margin: 1rem 0 0.3rem;
    font-weight: bold;
}
.form input, .form textarea, .form select {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-family: inherit;
}
</style>
{% endblock %}
